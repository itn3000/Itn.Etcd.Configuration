on:
  release:
    types:
      - published
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: setup dotnet 10.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: setup dotnet 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: do test
        run: dotnet run build.cs -- --target Pack --configuration Release
      - name: collect artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: artifacts/package/release/*.nupkg
      - name: collect log
        uses: actions/upload-artifact@v6
        with:
          name: binlog
          path: artifacts/buildlog/*.binlog
      - name: upload package to nuget
        run: "dotnet nuget push -k \"${{secrets.NUGET_API_KEY}}\" ./artifacts/package/release/Itn.Etcd.Configuration.*.nupkg -s https://api.nuget.org/v3/index.json"
      - name: upload package to release
        run: "gh release upload --clobber  ${{github.event.release.tag_name}} ./artifacts/package/release/Itn.Etcd.Configuration.*.nupkg"
        env:
          GH_TOKEN: ${{github.token}}
