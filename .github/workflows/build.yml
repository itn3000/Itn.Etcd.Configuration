on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version:
            - "10.0"
      - name: do test
        run: dotnet test Itn.Etcd.Configuration.AspireTest/Itn.Etcd.Configuration.AspireTest.csproj -c Release